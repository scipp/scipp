name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true # cancel jobs from previous push

jobs:
  formatting:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: lint
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - run: pixi run -e lint static
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Apply automatic formatting

  build_and_test:
    needs: formatting
    name: build and test ${{ matrix.variant.os }}, py${{ matrix.python-version }}
    runs-on: ${{ matrix.variant.os }}
    strategy:
      fail-fast: false
      matrix:
        variant:
        - {os: ubuntu-24.04}
        - {os: macos-15}
        - {os: windows-2022}
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # history required so cmake can determine version

      - uses: ilammy/msvc-dev-cmd@v1 # Required to set up MSVC dev environment for Ninja builds.

      # On Windows, only install the dev environment (manual cmake + PYTHONPATH).
      # pixi-build-cmake hits cmd.exe's 8191 char line-length limit on Windows,
      # so we avoid environments that depend on the default feature (which triggers it).
      - uses: prefix-dev/setup-pixi@v0.9.4
        if: ${{ contains(matrix.variant.os, 'windows') }}
        with:
          environments: dev
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - uses: prefix-dev/setup-pixi@v0.9.4
        if: ${{ !contains(matrix.variant.os, 'windows') }}
        with:
          environments: dev test docs type-check
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: ${{ matrix.variant.os }}

      - run: pixi run -e dev cpp-test

      # On Windows, pixi-build-cmake hits cmd.exe's 8191 char line-length limit,
      # so we run Python tests via the dev environment (manual cmake + PYTHONPATH).
      - run: pixi run -e dev test
        if: ${{ contains(matrix.variant.os, 'windows') }}
      - run: pixi run -e test test
        if: ${{ !contains(matrix.variant.os, 'windows') }}

      - run: pixi run -e type-check mypy
        if: ${{ contains(matrix.variant.os, 'ubuntu') }}

      - run: pixi run -e docs docs
        if: ${{ contains(matrix.variant.os, 'ubuntu') }}

      - run: pixi run -e docs linkcheck
        # Linkcheck can be flaky. Avoid randomly breaking PR builds by running only on `main`
        if: ${{ contains(matrix.variant.os, 'ubuntu') && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        if: ${{ contains(matrix.variant.os, 'ubuntu') }}
        with:
          name: DocumentationHTML
          path: html/
