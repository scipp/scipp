name: Run tests against nightly dependencies

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build_and_test:
    name: build and test ${{ matrix.variant.os }}, py${{ matrix.python-version }}
    runs-on: ${{ matrix.variant.os }}
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { os: ubuntu-24.04 }
          - { os: macos-15 }
          - { os: windows-2022 }
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # history required so cmake can determine version

      - uses: ilammy/msvc-dev-cmd@v1 # Required to set up MSVC dev environment for Ninja builds.

      # On Windows, only install the dev environment to avoid pixi-build-cmake
      # cmd.exe line-length limit issue.
      - uses: prefix-dev/setup-pixi@v0.9.4
        if: ${{ contains(matrix.variant.os, 'windows') }}
        with:
          environments: dev
          frozen: true
          cache: true
      - uses: prefix-dev/setup-pixi@v0.9.4
        if: ${{ !contains(matrix.variant.os, 'windows') }}
        with:
          environments: dev test
          frozen: true
          cache: true

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: ${{ matrix.variant.os }}

      - run: pixi run -e dev cpp-test

      - name: Install nightly dependencies and run tests (Unix)
        if: ${{ !contains(matrix.variant.os, 'windows') }}
        run: |
          pixi run -e test pip install --pre --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple --extra-index-url https://pypi.org/simple numpy scipy h5py pandas xarray
          pixi run -e test test

      - name: Install nightly dependencies and run tests (Windows)
        if: ${{ contains(matrix.variant.os, 'windows') }}
        run: |
          pixi run -e dev pip install --pre --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple --extra-index-url https://pypi.org/simple numpy scipy h5py pandas xarray
          pixi run -e dev test
