[workspace]
channels = ["https://prefix.dev/conda-forge"]
name = "scipp"
platforms = ["linux-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]

[workspace.build-variants]
python = ["3.11.*", "3.12.*", "3.13.*", "3.14.*"]

# ---------------------------------------------------------------------------
# Package definition (pixi-build-cmake)
# ---------------------------------------------------------------------------

[package]
name = "scipp"
version = "26.3.1"

[package.build]
backend = { name = "pixi-build-cmake", version = "*" }

[package.build.config]
extra-args = ["-DBENCHMARK=OFF", "-DSANITIZERS=OFF", "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON"]
compilers = ["cxx"]

[package.build.target.osx-arm64.config]
extra-args = ["-DBENCHMARK=OFF", "-DSANITIZERS=OFF", "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON", "-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0"]

[package.host-dependencies]
python = "*"
numpy = ">=2"
eigen = "3.4.*"
libboost-headers = ">=1.88"
pybind11 = "3.0.*"
tbb-devel = "2022.3.*"
gtest = "1.15.*"
gmock = "1.15.*"

[package.run-dependencies]
python = "*"
numpy = ">=2"
tbb = "2022.3.*"

# ---------------------------------------------------------------------------
# Workspace dependencies
# ---------------------------------------------------------------------------

# scipp = { path = "." } triggers pixi-build-cmake to build the C++ extension
# and install it into the conda environment (no PYTHONPATH needed).
[dependencies]
scipp = { path = "." }
python = ">=3.11"
numpy = ">=2"

[activation.env]
JUPYTER_PLATFORM_DIRS = "1"

# ---------------------------------------------------------------------------
# Dev feature (manual cmake builds for incremental development)
# ---------------------------------------------------------------------------

[feature.dev.dependencies]
python = ">=3.11"
numpy = ">=2"
cmake = ">=3.28"
ninja = "*"
eigen = "3.4.*"
libboost-headers = ">=1.88"
pybind11 = "3.0.*"
tbb = "2022.3.*"
tbb-devel = "2022.3.*"
benchmark = "1.6.*"
gmock = "1.15.*"
gtest = "1.15.*"

[feature.dev.target.linux-64.dependencies]
cppcheck = ">=2.18"

[feature.dev.tasks]
build = { cmd = "cmake --build build/{{ pixi.environment.name }} --config Release --target install", depends-on = ["configure"], description = "Build scipp (Release)" }
cpp-test = { cmd = "ctest --test-dir build/{{ pixi.environment.name }} -C Release --output-on-failure", depends-on = ["build"], description = "Run C++ tests" }
build-debug = { cmd = "cmake --build build-debug/{{ pixi.environment.name }} --config Debug --target install", depends-on = ["configure-debug"], description = "Build scipp (Debug)" }

[feature.dev.target.linux-64.tasks]
configure = { cmd = "cmake --preset ci-linux -B build/{{ pixi.environment.name }} -DCMAKE_INSTALL_PREFIX=install/{{ pixi.environment.name }}", description = "Configure cmake (Linux)" }
configure-debug = { cmd = "cmake --preset debug -B build-debug/{{ pixi.environment.name }} -DCMAKE_INSTALL_PREFIX=install-debug/{{ pixi.environment.name }}", description = "Configure cmake debug (Linux)" }

[feature.dev.target.osx-arm64.tasks]
configure = { cmd = "cmake --preset ci-macos -B build/{{ pixi.environment.name }} -DCMAKE_INSTALL_PREFIX=install/{{ pixi.environment.name }}", description = "Configure cmake (macOS)" }
configure-debug = { cmd = "cmake --preset debug -B build-debug/{{ pixi.environment.name }} -DCMAKE_INSTALL_PREFIX=install-debug/{{ pixi.environment.name }}", description = "Configure cmake debug (macOS)" }

[feature.dev.target.win-64.tasks]
configure = { cmd = "cmake --preset ci-windows -B build/{{ pixi.environment.name }} -DCMAKE_INSTALL_PREFIX=install/{{ pixi.environment.name }}", description = "Configure cmake (Windows)" }
configure-debug = { cmd = "cmake --preset debug -B build-debug/{{ pixi.environment.name }} -DCMAKE_INSTALL_PREFIX=install-debug/{{ pixi.environment.name }}", description = "Configure cmake debug (Windows)" }

[feature.dev.activation.env]
PYTHONPATH = "$PIXI_PROJECT_ROOT/install/$PIXI_ENVIRONMENT_NAME"

[feature.dev.target.linux-64.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"

[feature.dev.target.win-64.activation.env]
PYTHONPATH = "%PIXI_PROJECT_ROOT%\\install\\%PIXI_ENVIRONMENT_NAME%"

# ---------------------------------------------------------------------------
# Test feature
# ---------------------------------------------------------------------------

[feature.test.dependencies]
pytest = "*"
pytest-xdist = "*"
pytest-cov = "*"
hypothesis = "*"
beautifulsoup4 = "*"
matplotlib-base = "*"
# Scientific deps exercised by tests
scipy = ">=1.7.0"
h5py = "*"
numba = "*"
pooch = "*"
python-graphviz = "*"
plopp = "*"
pandas = "*"
xarray = "*"
ipython = "*"
ipywidgets = "*"
ipykernel = "*"

[feature.test.tasks]
import-minimal = { cmd = "python -c 'import scipp'", description = "Verify scipp can be imported" }
test = { cmd = "python -X PYTHONWARNDEFAULTENCODING -m pytest -n auto -v tests", description = "Run Python tests" }
coverage = { cmd = "python -m pytest --cov=scipp --cov-report html:coverage_html/python tests", description = "Run tests with coverage report" }

# ---------------------------------------------------------------------------
# Docs feature
# ---------------------------------------------------------------------------

[feature.docs.dependencies]
sphinx = "*"
nbsphinx = "*"
pydata-sphinx-theme = ">=0.14"
sphinx-autodoc-typehints = "*"
sphinx-copybutton = "*"
myst-parser = "*"
graphviz = "*"
pandoc = "*"
ipympl = "*"
ipywidgets = "*"
pythreejs = "*"
gitpython = "*"
packaging = "*"
requests = "*"

[feature.docs.tasks]
docs = { cmd = "python -m sphinx -v -b html -d doctrees docs html && python -m sphinx -v -b doctest -d doctrees docs html", description = "Build HTML docs and run doctests" }
docs-clean = { cmd = "sh -c 'rm -rf doctrees html docs/generated && python -m sphinx -v -b html -d doctrees docs html -E && python -m sphinx -v -b doctest -d doctrees docs html -E'", description = "Clean and rebuild docs from scratch" }
linkcheck = { cmd = "python -m sphinx -j4 -v -b linkcheck -d doctrees docs html", description = "Check documentation links" }

# ---------------------------------------------------------------------------
# Lint feature
# ---------------------------------------------------------------------------

[feature.lint.dependencies]
pre-commit = "*"

[feature.lint.tasks]
static = { cmd = "sh -c 'pre-commit run -a || (echo && pre-commit run -a)'", description = "Run all pre-commit checks" }
check-release = { cmd = "sh -c '! git grep -rl RELEASE_PLACEHOLDER docs/ src/scipp'", description = "Check no release placeholders remain" }

# ---------------------------------------------------------------------------
# Type-check feature
# ---------------------------------------------------------------------------

[feature.type-check.dependencies]
mypy = "*"
pandas-stubs = "*"

[feature.type-check.tasks]
mypy = { cmd = "python -m mypy . --exclude '^src/' --exclude '^install/'", description = "Run mypy type checking" }

# ---------------------------------------------------------------------------
# Python version features
# ---------------------------------------------------------------------------

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"

# Free-threaded Python environments (py313t, py314t) are not yet viable:
# most compiled conda-forge packages (scipy, numba, matplotlib, pybind11, etc.)
# lack cp313t/cp314t builds. Re-add when the ecosystem matures.

# ---------------------------------------------------------------------------
# Environments
# ---------------------------------------------------------------------------

[environments]
# Default environment: includes all features for `pixi run <task>` convenience
default = { features = ["test", "docs", "lint", "type-check", "py311"], solve-group = "default" }

# Dev environment: manual cmake builds with incremental compilation.
# Uses no-default-feature to avoid pixi-build-cmake (uses manual cmake + PYTHONPATH instead).
# This also works around a Windows cmd.exe line-length limit in pixi-build-cmake's build_env.bat.
dev = { features = ["dev", "test", "docs", "type-check", "py311"], no-default-feature = true, solve-group = "default" }

# CI/test environments: pixi-build-cmake builds the package automatically
test = { features = ["test", "py311"], solve-group = "default" }
test-py312 = ["test", "py312"]
test-py313 = ["test", "py313"]
test-py314 = ["test", "py314"]

docs = { features = ["test", "docs", "py311"], solve-group = "default" }
type-check = { features = ["test", "docs", "type-check", "py311"], solve-group = "default" }
lint = { features = ["lint"], no-default-feature = true }
